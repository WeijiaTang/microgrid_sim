<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" style="background-color: white; font-family: 'Times New Roman', serif;">
  <!-- 
    SVG Diagram of a Grid-Connected Microgrid.
    Adjusted width to 600px while maintaining component sizes.
    Redesigned signal flow with precise routing to avoid text overlap.
  -->

  <!-- 定义箭头标记 -->
  <defs>
    <!-- 单向箭头 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c" />
    </marker>
    <!-- 双向箭头开始 -->
    <marker id="arrowstart" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#e74c3c" />
    </marker>
    <!-- 双向箭头结束 -->
    <marker id="arrowend" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c" />
    </marker>
  </defs>

  <!-- ==================================================================== -->
  <!--                      COMPONENT PLACEMENT                           -->
  <!-- ==================================================================== -->

  <!-- HEMS (Control System) - 居中 -->
  <g id="hems-group" transform="translate(300, 80)">
    <!-- User-provided SVG for HEMS -->
    <g transform="scale(0.8) translate(-50, -50)">
      <rect x="5" y="15" width="90" height="65" rx="5" ry="5" fill="#d9534f"/>
      <g stroke="white" stroke-width="3" stroke-linecap="round">
        <line x1="30" y1="30" x2="30" y2="65"/><line x1="50" y1="30" x2="50" y2="65"/><line x1="70" y1="30" x2="70" y2="65"/>
      </g>
      <g fill="white">
        <circle cx="30" cy="40" r="5"/><circle cx="50" cy="55" r="5"/><circle cx="70" cy="35" r="5"/>
      </g>
      <rect x="45" y="80" width="10" height="10" fill="#d9534f"/>
      <rect x="35" y="90" width="30" height="5" rx="2" ry="2" fill="#d9534f"/>
    </g>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" font-size="14">HEMS</text>
  </g>

  <!-- PV System - 左侧 -->
  <g id="pv-group" transform="translate(150, 250)">
    <!-- User-provided SVG for PV -->
    <g transform="scale(0.6) translate(-70, -70)">
       <rect x="0" y="25" width="140" height="90" rx="5" ry="5" fill="#6a7a9a"/>
       <rect x="3" y="28" width="134" height="84" rx="3" ry="3" fill="#0b3d91"/>
       <g stroke="#d0e0ff" stroke-width="1.5">
         <line x1="26.33" y1="28" x2="26.33" y2="112"/><line x1="49.66" y1="28" x2="49.66" y2="112"/>
         <line x1="73.00" y1="28" x2="73.00" y2="112"/><line x1="96.33" y1="28" x2="96.33" y2="112"/>
         <line x1="119.66" y1="28" x2="119.66" y2="112"/><line x1="3" y1="50.5" x2="137" y2="50.5"/>
         <line x1="3" y1="73.0" x2="137" y2="73.0"/><line x1="3" y1="95.5" x2="137" y2="95.5"/>
       </g>
    </g>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" font-size="14">PV System</text>
  </g>

  <!-- Energy Storage - 中间 -->
  <g id="storage-group" transform="translate(300, 250)">
    <!-- User-provided SVG for Storage -->
    <g transform="scale(0.7) translate(-60, -80)">
      <rect x="5" y="45" width="110" height="70" rx="5" ry="5" fill="#2c2c2c"/>
      <rect x="70" y="35" width="25" height="10" fill="#2c2c2c"/>
      <rect x="25" y="35" width="25" height="10" fill="#2c2c2c"/>
      <path d="M 80 70 H 96 M 88 62 V 78" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="70" x2="48" y2="70" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" font-size="14">Energy Storage</text>
  </g>

  <!-- Load - 右侧 -->
  <g id="load-group" transform="translate(450, 250)">
    <!-- User-provided SVG for Load -->
    <g transform="scale(0.8) translate(-50, -50)">
      <path d="M 50 10 L 10 45 L 20 45 L 20 90 L 80 90 L 80 45 L 90 45 Z" fill="#2c2c2c"/>
      <polygon points="58,48 40,68 51,68 43,85 62,63 51,63" fill="white"/>
    </g>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" font-size="14">Load</text>
  </g>

  <!-- Electric Grid (Towers) - 扩展间距 -->
  <g id="grid-group">
    <!-- Tower 1 -->
    <g transform="translate(150, 420) scale(0.6)">
      <g transform="translate(-100, -100)">
        <defs><g id="insulator" stroke="#4285F4" stroke-width="4" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="12"/><line x1="-5" y1="3" x2="5" y2="3"/><line x1="-5" y1="9" x2="5" y2="9"/></g></defs>
        <g stroke="#4285F4" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M 65 198 L 100 15"/><path d="M 145 198 L 110 15"/><line x1="100" y1="15" x2="110" y2="15"/><line x1="90" y1="80" x2="120" y2="80"/><line x1="75" y1="140" x2="135" y2="140"/><path d="M 100 15 L 120 80"/><path d="M 110 15 L 90 80"/><path d="M 90 80 L 135 140"/><path d="M 120 80 L 75 140"/><path d="M 75 140 L 145 198"/><path d="M 135 140 L 65 198"/><path d="M 100 40 L 65 45 L 100 50"/><path d="M 110 40 L 145 45 L 110 50"/><path d="M 95 70 L 60 75 L 95 80"/><path d="M 115 70 L 150 75 L 115 80"/><use href="#insulator" x="65" y="45"/><use href="#insulator" x="145" y="45"/><use href="#insulator" x="60" y="75"/><use href="#insulator" x="150" y="75"/><rect x="60" y="198" width="10" height="5" stroke="none" fill="#4285F4"/><rect x="140" y="198" width="10" height="5" stroke="none" fill="#4285F4"/></g>
      </g>
    </g>
    <!-- Tower 2 -->
    <g transform="translate(300, 420) scale(0.6)">
      <g transform="translate(-100, -100)">
        <g stroke="#4285F4" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M 65 198 L 100 15"/><path d="M 145 198 L 110 15"/><line x1="100" y1="15" x2="110" y2="15"/><line x1="90" y1="80" x2="120" y2="80"/><line x1="75" y1="140" x2="135" y2="140"/><path d="M 100 15 L 120 80"/><path d="M 110 15 L 90 80"/><path d="M 90 80 L 135 140"/><path d="M 120 80 L 75 140"/><path d="M 75 140 L 145 198"/><path d="M 135 140 L 65 198"/><path d="M 100 40 L 65 45 L 100 50"/><path d="M 110 40 L 145 45 L 110 50"/><path d="M 95 70 L 60 75 L 95 80"/><path d="M 115 70 L 150 75 L 115 80"/><use href="#insulator" x="65" y="45"/><use href="#insulator" x="145" y="45"/><use href="#insulator" x="60" y="75"/><use href="#insulator" x="150" y="75"/><rect x="60" y="198" width="10" height="5" stroke="none" fill="#4285F4"/><rect x="140" y="198" width="10" height="5" stroke="none" fill="#4285F4"/></g>
      </g>
    </g>
    <!-- Tower 3 -->
    <g transform="translate(450, 420) scale(0.6)">
      <g transform="translate(-100, -100)">
        <g stroke="#4285F4" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M 65 198 L 100 15"/><path d="M 145 198 L 110 15"/><line x1="100" y1="15" x2="110" y2="15"/><line x1="90" y1="80" x2="120" y2="80"/><line x1="75" y1="140" x2="135" y2="140"/><path d="M 100 15 L 120 80"/><path d="M 110 15 L 90 80"/><path d="M 90 80 L 135 140"/><path d="M 120 80 L 75 140"/><path d="M 75 140 L 145 198"/><path d="M 135 140 L 65 198"/><path d="M 100 40 L 65 45 L 100 50"/><path d="M 110 40 L 145 45 L 110 50"/><path d="M 95 70 L 60 75 L 95 80"/><path d="M 115 70 L 150 75 L 115 80"/><use href="#insulator" x="65" y="45"/><use href="#insulator" x="145" y="45"/><use href="#insulator" x="60" y="75"/><use href="#insulator" x="150" y="75"/><rect x="60" y="198" width="10" height="5" stroke="none" fill="#4285F4"/><rect x="140" y="198" width="10" height="5" stroke="none" fill="#4285F4"/></g>
      </g>
    </g>
    <text x="300" y="550" text-anchor="middle" font-size="14">Electric Grid</text>
  </g>
  
  <!-- Substation -->
  <g id="substation-group" transform="translate(300, 650)">
    <!-- User-provided SVG for Substation -->
    <g transform="scale(0.8) translate(-50, -50)">
      <path d="M 35,10 L 65,10 L 65,20 L 80,20 L 80,35 L 90,35 L 90,65 L 80,65 L 80,80 L 65,80 L 65,90 L 35,90 L 35,80 L 20,80 L 20,65 L 10,65 L 10,35 L 20,35 L 20,20 L 35,20 Z" fill="black"/>
      <circle cx="50" cy="50" r="22" fill="white"/>
      <polygon points="53,40 43,55 49,55 45,65 57,50 51,50" fill="black"/>
    </g>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" font-size="14">Substation</text>
  </g>

  <!-- ==================================================================== -->
  <!--                      POWER FLOW LINES (Black)                        -->
  <!-- ==================================================================== -->
  <g stroke="black" stroke-width="2" fill="none">
    <!-- From Components to Towers - 调整位置避免遮挡 -->
    <path d="M 150 295 V 360" /> <!-- PV to Tower 1 -->
    <path d="M 300 295 V 360" /> <!-- Storage to Tower 2 -->
    <path d="M 450 295 V 360" /> <!-- Load to Tower 3 -->

    <!-- From Towers to Common Bus -->
    <path d="M 150 480 V 520" /> <!-- Tower 1 to Bus -->
    <path d="M 300 480 V 520" /> <!-- Tower 2 to Bus -->
    <path d="M 450 480 V 520" /> <!-- Tower 3 to Bus -->

    <!-- Common Bus Horizontal Line -->
    <line x1="150" y1="520" x2="450" y2="520"/>

    <!-- Common Bus to Substation -->
    <path d="M 300 520 V 610" />
  </g>
  
  <!-- ==================================================================== -->
  <!--                  INFORMATION FLOW LINES (Thin Red)                   -->
  <!-- ==================================================================== -->
  <g stroke="#e74c3c" stroke-width="1.5" fill="none">
    <!-- PV to HEMS - "∟"型路径，连接到HEMS左翼中间 -->
    <path d="M 150 205 V 80 L 250 80" marker-end="url(#arrowhead)" />
    
    <!-- Load to HEMS - "∟"型路径，连接到HEMS右翼中间 -->
    <path d="M 450 205 V 80 L 350 80" marker-end="url(#arrowhead)" />
    
    <!-- Storage双向连接到HEMS -->
    <path d="M 300 205 V 140" marker-start="url(#arrowstart)" marker-end="url(#arrowend)" />
  </g>
  
  <!-- ==================================================================== -->
  <!--                               LEGEND                                 -->
  <!-- ==================================================================== -->
  <g id="legend" transform="translate(120, 650)">
    <text x="0" y="0" font-size="14" font-weight="bold">Legend:</text>
    <!-- Power Flow -->
    <line x1="0" y1="20" x2="30" y2="20" stroke="black" stroke-width="2"/>
    <text x="40" y="24" font-size="12">Power Flow</text>
    <!-- Information Flow -->
    <line x1="0" y1="45" x2="30" y2="45" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="40" y="49" font-size="12">Information Flow</text>
  </g>
</svg>