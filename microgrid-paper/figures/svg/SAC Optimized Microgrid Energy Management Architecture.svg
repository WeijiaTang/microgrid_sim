<svg width="100%" height="100%" viewBox="8 16 1375 880" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff; font-family: Arial, sans-serif;">
    
    <!-- ================= Definitions ================= -->
    <defs>
        <!-- Standardized B&W Markers for IEEE clarity -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
        </marker>
        <marker id="arrow-start" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 10 0 L 0 5 L 10 10 z" fill="#000000"/>
        </marker>
        <marker id="arrow-large" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
        </marker>
    </defs>

    <!-- ================= LEFT SIDE: MICROGRID PHYSICAL LAYER ================= -->
    <g transform="translate(-62, 42) scale(1.24)">
        <!-- Group Background -->
        <text x="300" y="15" font-size="22" font-weight="bold" fill="#000000" text-anchor="middle">Microgrid System</text>

        <!-- Component: HEMS -->
        <g id="hems-group" transform="translate(300, 80)">
            <g transform="scale(0.8) translate(-50, -50)">
                <rect x="5" y="15" width="90" height="65" rx="5" ry="5" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <g stroke="#000000" stroke-width="2.5" stroke-linecap="round">
                    <line x1="30" y1="30" x2="30" y2="65"/><line x1="50" y1="30" x2="50" y2="65"/><line x1="70" y1="30" x2="70" y2="65"/>
                </g>
                <g fill="#ffffff" stroke="#000000" stroke-width="1.5">
                    <circle cx="30" cy="40" r="5"/><circle cx="50" cy="55" r="5"/><circle cx="70" cy="35" r="5"/>
                </g>
                <rect x="45" y="80" width="10" height="10" fill="#000000"/>
                <rect x="35" y="90" width="30" height="5" rx="2" ry="2" fill="#000000"/>
            </g>
            <text x="0" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">EMS Controller</text>
        </g>

        <!-- Component: PV Array -->
        <g id="pv-group" transform="translate(150, 250)">
            <g transform="scale(0.78) translate(-70, -70)">
                <rect x="0" y="25" width="140" height="90" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <rect x="4" y="29" width="132" height="82" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
                <g stroke="#000000" stroke-width="1">
                    <line x1="26" y1="29" x2="26" y2="111"/><line x1="49" y1="29" x2="49" y2="111"/>
                    <line x1="73" y1="29" x2="73" y2="111"/><line x1="96" y1="29" x2="96" y2="111"/>
                    <line x1="120" y1="29" x2="120" y2="111"/><line x1="4" y1="50.5" x2="136" y2="50.5"/>
                    <line x1="4" y1="73.0" x2="136" y2="73.0"/><line x1="4" y1="95.5" x2="136" y2="95.5"/>
                </g>
            </g>
            <text x="0" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">PV Array</text>
        </g>

        <!-- Component: BESS -->
        <g id="storage-group" transform="translate(300, 250)">
            <g transform="scale(0.85) translate(-60, -80)">
                <rect x="5" y="45" width="110" height="70" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <rect x="70" y="35" width="25" height="10" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <rect x="25" y="35" width="25" height="10" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <!-- Battery indicator lines inside -->
                <path d="M 80 70 H 96 M 88 62 V 78" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
                <line x1="32" y1="70" x2="48" y2="70" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
            </g>
            <text x="0" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">BESS</text>
        </g>

        <!-- Component: Load -->
        <g id="load-group" transform="translate(450, 250)">
            <g transform="scale(0.9) translate(-50, -50)">
                <path d="M 50 10 L 10 45 L 20 45 L 20 90 L 80 90 L 80 45 L 90 45 Z" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <polygon points="58,48 40,68 51,68 43,85 62,63 51,63" fill="#000000"/>
            </g>
            <text x="0" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Load Demand</text>
        </g>

        <!-- Component: Grid -->
        <g id="grid-group">
            <g transform="translate(150, 420) scale(0.6)">
                <g transform="translate(-100, -100)">
                    <g stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 65 198 L 100 15"/><path d="M 145 198 L 110 15"/><line x1="100" y1="15" x2="110" y2="15"/><line x1="90" y1="80" x2="120" y2="80"/><line x1="75" y1="140" x2="135" y2="140"/><path d="M 100 15 L 120 80"/><path d="M 110 15 L 90 80"/><path d="M 90 80 L 135 140"/><path d="M 120 80 L 75 140"/><path d="M 75 140 L 145 198"/><path d="M 135 140 L 65 198"/><path d="M 100 40 L 65 45 L 100 50"/><path d="M 110 40 L 145 45 L 110 50"/><path d="M 95 70 L 60 75 L 95 80"/><path d="M 115 70 L 150 75 L 115 80"/>
                        <rect x="60" y="198" width="10" height="5" stroke="none" fill="#000000"/><rect x="140" y="198" width="10" height="5" stroke="none" fill="#000000"/>
                    </g>
                </g>
            </g>
            <g transform="translate(300, 420) scale(0.6)">
                <g transform="translate(-100, -100)">
                    <g stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 65 198 L 100 15"/><path d="M 145 198 L 110 15"/><line x1="100" y1="15" x2="110" y2="15"/><line x1="90" y1="80" x2="120" y2="80"/><line x1="75" y1="140" x2="135" y2="140"/><path d="M 100 15 L 120 80"/><path d="M 110 15 L 90 80"/><path d="M 90 80 L 135 140"/><path d="M 120 80 L 75 140"/><path d="M 75 140 L 145 198"/><path d="M 135 140 L 65 198"/><path d="M 100 40 L 65 45 L 100 50"/><path d="M 110 40 L 145 45 L 110 50"/><path d="M 95 70 L 60 75 L 95 80"/><path d="M 115 70 L 150 75 L 115 80"/>
                        <rect x="60" y="198" width="10" height="5" stroke="none" fill="#000000"/><rect x="140" y="198" width="10" height="5" stroke="none" fill="#000000"/>
                    </g>
                </g>
            </g>
            <g transform="translate(450, 420) scale(0.6)">
                <g transform="translate(-100, -100)">
                    <g stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 65 198 L 100 15"/><path d="M 145 198 L 110 15"/><line x1="100" y1="15" x2="110" y2="15"/><line x1="90" y1="80" x2="120" y2="80"/><line x1="75" y1="140" x2="135" y2="140"/><path d="M 100 15 L 120 80"/><path d="M 110 15 L 90 80"/><path d="M 90 80 L 135 140"/><path d="M 120 80 L 75 140"/><path d="M 75 140 L 145 198"/><path d="M 135 140 L 65 198"/><path d="M 100 40 L 65 45 L 100 50"/><path d="M 110 40 L 145 45 L 110 50"/><path d="M 95 70 L 60 75 L 95 80"/><path d="M 115 70 L 150 75 L 115 80"/>
                        <rect x="60" y="198" width="10" height="5" stroke="none" fill="#000000"/><rect x="140" y="198" width="10" height="5" stroke="none" fill="#000000"/>
                    </g>
                </g>
            </g>
            <text x="300" y="550" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Utility Grid</text>
        </g>

        <!-- Component: Substation -->
        <g id="substation-group" transform="translate(300, 650)">
            <g transform="scale(0.8) translate(-50, -50)">
                <path d="M 35,10 L 65,10 L 65,20 L 80,20 L 80,35 L 90,35 L 90,65 L 80,65 L 80,80 L 65,80 L 65,90 L 35,90 L 35,80 L 20,80 L 20,65 L 10,65 L 10,35 L 20,35 L 20,20 L 35,20 Z" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <circle cx="50" cy="50" r="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
                <polygon points="53,40 43,55 49,55 45,65 57,50 51,50" fill="#000000"/>
            </g>
            <text x="0" y="55" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">PCC Substation</text>
        </g>

        <!-- Power Flow Lines (Solid Black Thick) -->
        <g stroke="#000000" stroke-width="3" fill="none">
            <path d="M 150 310 V 360" />
            <path d="M 300 310 V 360" />
            <path d="M 450 310 V 360" />
            <path d="M 150 480 V 520" />
            <path d="M 300 480 V 520" />
            <path d="M 450 480 V 520" />
            <line x1="150" y1="520" x2="450" y2="520" stroke-width="4"/> <!-- Main AC Bus -->
            <path d="M 300 520 V 610" />
        </g>

        <!-- Info/Data Flow Lines (Dashed Black) -->
        <g stroke="#000000" stroke-width="2" stroke-dasharray="6,4" fill="none">
            <path d="M 150 205 V 80 L 250 80" marker-end="url(#arrow)" />
            <path d="M 450 205 V 80 L 350 80" marker-end="url(#arrow)" />
            <path d="M 300 205 V 140" marker-start="url(#arrow-start)" marker-end="url(#arrow)" />
        </g>
    </g>

    <!-- ================= RIGHT SIDE: SAC ALGORITHM AGENT ================= -->
    <g transform="translate(652, 22) scale(1.10)">
        <!-- Group Background -->
        <rect x="-8" y="38" width="668" height="752" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="8,6"/>
        <text x="350" y="65" font-size="22" font-weight="bold" text-anchor="middle" fill="#000000">Soft Actor-Critic (SAC) Agent</text>

        <!-- 1. State Representation Block -->
        <rect x="50" y="100" width="200" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
        <text x="150" y="130" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">State (S)</text>
        <text x="150" y="155" font-size="14" text-anchor="middle" fill="#000000">s<tspan dy="4" font-size="10">t</tspan></text>
        <text x="150" y="180" font-size="14" text-anchor="middle" fill="#000000">Reward r<tspan dy="4" font-size="10">t</tspan><tspan dy="-4"> = - Cost</tspan></text>
        <text x="150" y="205" font-size="14" text-anchor="middle" fill="#000000">Next State s<tspan dy="4" font-size="10">t+1</tspan></text>

        <!-- 2. Experience Replay Buffer -->
        <rect x="50" y="380" width="200" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
        <text x="150" y="415" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Replay Buffer (D)</text>
        <text x="150" y="445" font-size="14" text-anchor="middle" fill="#000000">Store (s, a, r, s')</text>

        <!-- 3. Training Loop Block -->
        <rect x="50" y="620" width="200" height="140" fill="#ffffff" stroke="#000000" stroke-width="2"/>
        <text x="150" y="660" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Training Loop</text>
        <text x="150" y="700" font-size="14" text-anchor="middle" fill="#000000">Sample Mini-batch</text>
        <text x="150" y="725" font-size="14" text-anchor="middle" fill="#000000">Update Parameters</text>

        <!-- 4. Actor Network (Policy) -->
        <rect x="350" y="100" width="300" height="120" fill="#ffffff" stroke="#000000" stroke-width="2"/>
        <text x="500" y="130" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Actor (Policy &#960;)</text>
        <text x="500" y="155" font-size="14" text-anchor="middle" fill="#000000">Maximize Return</text>
        <line x1="370" y1="170" x2="630" y2="170" stroke="#000000" stroke-width="1"/>
        <text x="500" y="190" font-size="14" text-anchor="middle" fill="#000000">Input: s<tspan dy="4" font-size="10">t</tspan></text>
        <text x="500" y="210" font-size="14" text-anchor="middle" fill="#000000">Output: a<tspan dy="4" font-size="10">t</tspan><tspan dy="-4"> ~ &#960;(&#183;|s</tspan><tspan dy="4" font-size="10">t</tspan><tspan dy="-4">)</tspan></text>

        <!-- 5. Critic Networks (Q-Functions) -->
        <g id="q-networks">
            <rect x="350" y="300" width="145" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
            <text x="422" y="340" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Critic Q1</text>
            <text x="422" y="370" font-size="14" text-anchor="middle" fill="#000000">Q<tspan dy="4" font-size="10">1</tspan><tspan dy="-4">(s, a)</tspan></text>

            <rect x="505" y="300" width="145" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
            <text x="577" y="340" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Critic Q2</text>
            <text x="577" y="370" font-size="14" text-anchor="middle" fill="#000000">Q<tspan dy="4" font-size="10">2</tspan><tspan dy="-4">(s, a)</tspan></text>
        </g>

        <!-- 6. Target Networks -->
        <g id="target-networks">
            <rect x="350" y="480" width="145" height="100" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="6,4"/>
            <text x="422" y="535" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Target Q1'</text>

            <rect x="505" y="480" width="145" height="100" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="6,4"/>
            <text x="577" y="535" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Target Q2'</text>
        </g>

        <!-- 7. Value Function / Bellman Update -->
        <rect x="350" y="660" width="300" height="100" fill="#ffffff" stroke="#000000" stroke-width="2"/>
        <text x="500" y="695" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000">Soft Value Update</text>
        <text x="500" y="725" font-size="14" text-anchor="middle" fill="#000000">Min(Q1, Q2) - &#945; log(&#960;)</text>
    </g>

    <!-- ================= SAC INTERNAL ROUTING (Solid/Dashed Lines) ================= -->
    <g transform="translate(652, 22) scale(1.10)" stroke="#000000" stroke-width="2" fill="none">
        <!-- State to Actor -->
        <path d="M 250 160 L 350 160" marker-end="url(#arrow)"/>
        <text x="300" y="152" font-size="12" fill="#000000" text-anchor="middle" stroke="none">State</text>

        <!-- Actor Action Output -->
        <path d="M 350 190 L 250 190" marker-end="url(#arrow)"/>
        <text x="300" y="205" font-size="12" fill="#000000" text-anchor="middle" stroke="none">Action</text>

        <!-- Storage into Buffer -->
        <path d="M 150 220 L 150 380" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
        <text x="160" y="300" font-size="12" fill="#000000" stroke="none">Store</text>

        <!-- Sampling from Buffer -->
        <path d="M 150 480 L 150 620" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
        <text x="160" y="550" font-size="12" fill="#000000" stroke="none">Sample</text>

        <!-- Update Logic -->
        <path d="M 250 670 L 290 670 L 290 260 L 390 260 L 390 220" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
        <text x="305" y="465" font-size="12" fill="#000000" stroke="none">Gradient Update</text>

        <!-- Actor to Critics -->
        <path d="M 500 220 L 500 250 L 422 250 L 422 300" marker-end="url(#arrow)"/>
        <path d="M 500 250 L 577 250 L 577 300" marker-end="url(#arrow)"/>

        <!-- Soft Update to Targets -->
        <path d="M 422 400 L 422 480" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
        <path d="M 577 400 L 577 480" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

        <!-- Target calculation to Value -->
        <path d="M 422 580 L 422 610 L 500 610 L 500 660" marker-end="url(#arrow)"/>
        <path d="M 577 580 L 577 610 L 500 610" />

        <!-- Backpropagation / Loss -->
        <path d="M 350 710 L 250 710" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
    </g>

    <!-- ================= INTEGRATION LAYER ================= -->
    <g id="integration-layer">

        <!-- 1. Observation Flow -->
        <path d="M 394 216 C 422 216, 554 216, 700 216" stroke="#000000" stroke-width="2.5" fill="none" stroke-dasharray="8,6" marker-end="url(#arrow-large)"/>
        <rect x="458" y="200" width="178" height="32" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
        <text x="547" y="221" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle">State Observation (s<tspan dy="4" font-size="10">t</tspan><tspan dy="-4">)</tspan></text>

        <!-- 2. Reward Flow -->
        <path d="M 388 236 C 548 286, 588 338, 620 374 C 642 396, 666 418, 692 428" stroke="#000000" stroke-width="2.5" fill="none" stroke-dasharray="8,6" marker-end="url(#arrow-large)"/>
        <rect x="560" y="332" width="148" height="34" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
        <text x="634" y="354" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle">Reward Signal (r<tspan dy="4" font-size="10">t</tspan><tspan dy="-4">)</tspan></text>

        <!-- 3. Control Action Flow -->
        <path d="M 1036 134 C 1036 24, 544 16, 372 128" stroke="#000000" stroke-width="3" fill="none" stroke-dasharray="10,5" marker-end="url(#arrow-large)"/>
        <rect x="562" y="40" width="170" height="34" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
        <text x="647" y="62" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle">Optimal Action (a<tspan dy="4" font-size="10">t</tspan><tspan dy="-4">)</tspan></text>

    </g>

</svg>
